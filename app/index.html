<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cupertino DNA: SF Pro is the system font on Apple platforms; no webfont
         needed. Non-Apple platforms fall back to the native system sans. -->
    <title>plan-up</title>
    <meta name="description" content="ClickUp without the seat tax. Single-user, local-first task & sprint planner — no backend, data stays in your browser." />
    <!-- Link preview (Open Graph + Twitter). NOTE: og:image should be an ABSOLUTE
         URL for some scrapers (e.g. Telegram); make it https://<domain>/og-image.png
         once a domain exists. Relative works for scrapers that resolve against page URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="plan-up" />
    <meta property="og:title" content="plan-up — local-first sprint planner" />
    <meta property="og:description" content="ClickUp without the seat tax. Single-user, no backend, data stays in your browser." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="plan-up — local-first sprint planner" />
    <meta name="twitter:description" content="ClickUp without the seat tax. Single-user, no backend, data stays in your browser." />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
